<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>드럼 연습 일지</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap');

  :root {
    --bg: #0e0e10;
    --surface: #18181c;
    --surface2: #222228;
    --border: #2e2e36;
    --accent: #e05c2a;
    --accent-dim: rgba(224,92,42,0.15);
    --text: #f0ede8;
    --text-2: #9896a0;
    --text-3: #55545e;
    --green: #3ecf6e;
    --green-dim: rgba(62,207,110,0.12);
    --radius: 10px;
    --radius-lg: 16px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .page {
    max-width: 720px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 2.5rem;
  }
  .drum-icon {
    width: 48px; height: 48px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .header-text h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .header-text p {
    font-size: 13px;
    color: var(--text-2);
    margin-top: 2px;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.4rem 1.5rem;
    margin-bottom: 1rem;
  }
  .card-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .card-title span {
    display: inline-block;
    width: 3px; height: 12px;
    background: var(--accent);
    border-radius: 2px;
  }

  /* Form fields */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label {
    font-size: 11px;
    color: var(--text-2);
    font-weight: 500;
    letter-spacing: 0.03em;
  }
  .field input, .field textarea, .field select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 12px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    border-color: var(--accent);
  }
  .field input::placeholder, .field textarea::placeholder {
    color: var(--text-3);
  }
  .field textarea {
    resize: vertical;
    min-height: 80px;
    line-height: 1.7;
  }

  /* 참고표 */
  .ref-table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    text-align: left;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-3);
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }
  tbody td { padding: 4px 6px; }
  tbody td input {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    padding: 5px 4px;
    outline: none;
    border-radius: 6px;
    transition: background 0.12s;
  }
  tbody td input:focus { background: var(--surface2); }
  tbody td input::placeholder { color: var(--text-3); }
  .del-row {
    background: none;
    border: none;
    color: var(--text-3);
    cursor: pointer;
    font-size: 16px;
    padding: 4px 6px;
    border-radius: 6px;
    transition: color 0.12s, background 0.12s;
  }
  .del-row:hover { color: var(--accent); background: var(--accent-dim); }

  /* Add buttons */
  .add-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-2);
    background: none;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 7px 14px;
    margin-top: 10px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: border-color 0.15s, color 0.15s;
    width: 100%;
    justify-content: center;
  }
  .add-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* 체크리스트 */
  .check-list { display: flex; flex-direction: column; gap: 8px; }
  .check-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px;
    transition: border-color 0.15s;
  }
  .check-item.done {
    border-color: var(--green);
    background: var(--green-dim);
  }
  .check-item input[type=checkbox] {
    width: 16px; height: 16px;
    accent-color: var(--green);
    flex-shrink: 0;
    cursor: pointer;
  }
  .check-item input[type=text] {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    outline: none;
    padding: 0;
  }
  .check-item input[type=text]::placeholder { color: var(--text-3); }
  .check-item.done input[type=text] {
    text-decoration: line-through;
    color: var(--text-2);
  }

  /* 별점 */
  .stars { display: flex; gap: 6px; margin-top: 6px; }
  .star {
    font-size: 26px;
    color: var(--text-3);
    cursor: pointer;
    transition: color 0.1s, transform 0.1s;
    line-height: 1;
    user-select: none;
  }
  .star:hover { transform: scale(1.15); }
  .star.on { color: #f0a500; }
  .rating-label {
    font-size: 12px;
    color: var(--text-2);
    margin-top: 6px;
    min-height: 18px;
    transition: color 0.2s;
  }

  /* Divider */
  hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }

  /* Bottom bar */
  .bottom-bar {
    display: flex;
    gap: 10px;
    margin-top: 1.5rem;
  }
  .btn {
    flex: 1;
    padding: 12px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    border-radius: var(--radius);
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.98); }
  .btn-save {
    background: var(--accent);
    color: #fff;
  }
  .btn-save:hover { opacity: 0.88; }
  .btn-print {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-print:hover { background: var(--surface2); }
  .btn-clear {
    background: var(--surface);
    color: var(--text-2);
    border: 1px solid var(--border);
    flex: 0 0 auto;
    padding: 12px 18px;
  }
  .btn-clear:hover { color: var(--accent); border-color: var(--accent); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--surface);
    border: 1px solid var(--green);
    color: var(--green);
    padding: 10px 20px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Progress bar */
  .progress-wrap { margin-bottom: 12px; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-2);
    margin-bottom: 5px;
  }
  .progress-bar-bg {
    background: var(--surface2);
    border-radius: 999px;
    height: 4px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--green);
    border-radius: 999px;
    width: 0%;
    transition: width 0.3s ease;
  }

  @media (max-width: 520px) {
    .grid-2 { grid-template-columns: 1fr; }
    .header h1 { font-size: 20px; }
  }

  @media print {
    body { background: #fff; color: #111; padding: 0; }
    :root {
      --bg: #fff; --surface: #f8f8f8; --surface2: #f0f0f0;
      --border: #ddd; --text: #111; --text-2: #555; --text-3: #999;
    }
    .bottom-bar, .toast { display: none; }
    .card { break-inside: avoid; }
  }
</style>
</head>
<body>

<div class="page">

  <div class="header">
    <div class="drum-icon">🥁</div>
    <div class="header-text">
      <h1>드럼 연습 일지</h1>
      <p>오늘의 연습을 기록하고 성장을 추적하세요</p>
    </div>
  </div>

  <!-- 날짜 & 기본 정보 -->
  <div class="card">
    <div class="card-title"><span></span>날짜 &amp; 기본 정보</div>
    <div class="grid-2">
      <div class="field">
        <label>날짜</label>
        <input type="date" id="f-date">
      </div>
      <div class="field">
        <label>연습 시간</label>
        <input type="text" id="f-duration" placeholder="예) 1시간 30분">
      </div>
    </div>
  </div>

  <!-- 연습 참고표 -->
  <div class="card">
    <div class="card-title"><span></span>연습 참고표 (루틴)</div>
    <div class="ref-table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:34%">항목</th>
            <th style="width:18%">BPM</th>
            <th style="width:16%">시간</th>
            <th style="width:24%">비고</th>
            <th style="width:8%"></th>
          </tr>
        </thead>
        <tbody id="ref-tbody">
          <tr>
            <td><input type="text" value="워밍업 — 싱글 스트로크"></td>
            <td><input type="text" value="60–80"></td>
            <td><input type="text" value="10분"></td>
            <td><input type="text" placeholder="메모"></td>
            <td><button class="del-row" onclick="delRow(this)" title="삭제">×</button></td>
          </tr>
          <tr>
            <td><input type="text" value="기초 루디먼트"></td>
            <td><input type="text" value="80–100"></td>
            <td><input type="text" value="15분"></td>
            <td><input type="text" placeholder="패러디들, 플램"></td>
            <td><button class="del-row" onclick="delRow(this)" title="삭제">×</button></td>
          </tr>
          <tr>
            <td><input type="text" value="비트 패턴 연습"></td>
            <td><input type="text" value="90–120"></td>
            <td><input type="text" value="20분"></td>
            <td><input type="text" placeholder="메모"></td>
            <td><button class="del-row" onclick="delRow(this)" title="삭제">×</button></td>
          </tr>
          <tr>
            <td><input type="text" value="곡 연습"></td>
            <td><input type="text" placeholder="원곡 BPM"></td>
            <td><input type="text" value="20분"></td>
            <td><input type="text" placeholder="메모"></td>
            <td><button class="del-row" onclick="delRow(this)" title="삭제">×</button></td>
          </tr>
          <tr>
            <td><input type="text" value="쿨다운 / 필 연습"></td>
            <td><input type="text" placeholder="자유"></td>
            <td><input type="text" value="10분"></td>
            <td><input type="text" placeholder="메모"></td>
            <td><button class="del-row" onclick="delRow(this)" title="삭제">×</button></td>
          </tr>
        </tbody>
      </table>
    </div>
    <button class="add-btn" onclick="addRefRow()">+ 항목 추가</button>
  </div>

  <!-- 당일 연습 체크리스트 -->
  <div class="card">
    <div class="card-title"><span></span>당일 연습 체크리스트</div>

    <div class="progress-wrap">
      <div class="progress-label">
        <span>완료율</span>
        <span id="prog-text">0 / 0</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="prog-fill"></div>
      </div>
    </div>

    <div class="check-list" id="check-list">
      <div class="check-item">
        <input type="checkbox" onchange="onCheck(this)">
        <input type="text" placeholder="연습 항목을 입력하세요">
        <button class="del-row" onclick="delCheck(this)" title="삭제">×</button>
      </div>
      <div class="check-item">
        <input type="checkbox" onchange="onCheck(this)">
        <input type="text" placeholder="연습 항목을 입력하세요">
        <button class="del-row" onclick="delCheck(this)" title="삭제">×</button>
      </div>
      <div class="check-item">
        <input type="checkbox" onchange="onCheck(this)">
        <input type="text" placeholder="연습 항목을 입력하세요">
        <button class="del-row" onclick="delCheck(this)" title="삭제">×</button>
      </div>
    </div>
    <button class="add-btn" onclick="addCheck()">+ 항목 추가</button>
  </div>

  <!-- 오늘의 기록 -->
  <div class="card">
    <div class="card-title"><span></span>오늘의 기록</div>
    <div class="grid-2" style="margin-bottom:12px;">
      <div class="field">
        <label>잘 된 점 ✓</label>
        <textarea id="f-good" placeholder="오늘 잘 됐다고 느낀 것들..."></textarea>
      </div>
      <div class="field">
        <label>개선할 점 ↑</label>
        <textarea id="f-improve" placeholder="다음에 더 집중해야 할 것들..."></textarea>
      </div>
    </div>
    <div class="field" style="margin-bottom:14px;">
      <label>메모 / 특이사항</label>
      <textarea id="f-memo" placeholder="기타 자유롭게 기록..." style="min-height:60px;"></textarea>
    </div>
    <hr>
    <div class="field">
      <label>오늘 연습 만족도</label>
      <div class="stars" id="stars">
        <span class="star" data-v="1" onclick="setRating(1)">★</span>
        <span class="star" data-v="2" onclick="setRating(2)">★</span>
        <span class="star" data-v="3" onclick="setRating(3)">★</span>
        <span class="star" data-v="4" onclick="setRating(4)">★</span>
        <span class="star" data-v="5" onclick="setRating(5)">★</span>
      </div>
      <div class="rating-label" id="rating-label">별을 클릭해 만족도를 남겨보세요</div>
    </div>
  </div>

  <div class="bottom-bar">
    <button class="btn btn-save" onclick="saveLog()">💾 저장</button>
    <button class="btn btn-print" onclick="window.print()">🖨 인쇄 / PDF</button>
    <button class="btn btn-clear" onclick="clearLog()" title="초기화">↺</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  // 날짜 초기화
  const today = new Date();
  document.getElementById('f-date').valueAsDate = today;

  // 참고표 행 추가/삭제
  function addRefRow() {
    const tbody = document.getElementById('ref-tbody');
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="text" placeholder="항목명"></td>
      <td><input type="text" placeholder="BPM"></td>
      <td><input type="text" placeholder="분"></td>
      <td><input type="text" placeholder="메모"></td>
      <td><button class="del-row" onclick="delRow(this)" title="삭제">×</button></td>
    `;
    tbody.appendChild(tr);
    tr.querySelector('input').focus();
  }
  function delRow(btn) {
    const row = btn.closest('tr');
    if (document.querySelectorAll('#ref-tbody tr').length > 1) row.remove();
    else showToast('마지막 항목은 삭제할 수 없어요');
  }

  // 체크리스트
  function addCheck() {
    const list = document.getElementById('check-list');
    const div = document.createElement('div');
    div.className = 'check-item';
    div.innerHTML = `
      <input type="checkbox" onchange="onCheck(this)">
      <input type="text" placeholder="연습 항목을 입력하세요">
      <button class="del-row" onclick="delCheck(this)" title="삭제">×</button>
    `;
    list.appendChild(div);
    div.querySelector('input[type=text]').focus();
    updateProgress();
  }
  function delCheck(btn) {
    const item = btn.closest('.check-item');
    if (document.querySelectorAll('.check-item').length > 1) {
      item.remove();
      updateProgress();
    } else {
      showToast('마지막 항목은 삭제할 수 없어요');
    }
  }
  function onCheck(cb) {
    cb.closest('.check-item').classList.toggle('done', cb.checked);
    updateProgress();
  }
  function updateProgress() {
    const all = document.querySelectorAll('.check-item');
    const done = document.querySelectorAll('.check-item.done');
    const pct = all.length ? Math.round(done.length / all.length * 100) : 0;
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('prog-text').textContent = done.length + ' / ' + all.length;
  }

  // 별점
  let rating = 0;
  const ratingLabels = ['', '아쉬운 연습이었어요', '조금 부족했어요', '그럭저럭 괜찮았어요', '꽤 잘 됐어요! 🔥', '완벽한 하루! 🎉'];
  function setRating(v) {
    rating = v;
    document.querySelectorAll('#stars .star').forEach(s => {
      s.classList.toggle('on', parseInt(s.dataset.v) <= v);
    });
    document.getElementById('rating-label').textContent = ratingLabels[v];
  }

  // 저장 (localStorage)
  function saveLog() {
    const checkItems = [...document.querySelectorAll('.check-item')].map(item => ({
      text: item.querySelector('input[type=text]').value,
      done: item.querySelector('input[type=checkbox]').checked
    }));

    const refRows = [...document.querySelectorAll('#ref-tbody tr')].map(tr => {
      const inputs = tr.querySelectorAll('input[type=text]');
      return { item: inputs[0].value, bpm: inputs[1].value, time: inputs[2].value, note: inputs[3].value };
    });

    const data = {
      date: document.getElementById('f-date').value,
      duration: document.getElementById('f-duration').value,
      good: document.getElementById('f-good').value,
      improve: document.getElementById('f-improve').value,
      memo: document.getElementById('f-memo').value,
      rating,
      checkItems,
      refRows
    };

    const key = 'drum-log-' + data.date;
    localStorage.setItem(key, JSON.stringify(data));
    showToast('✓ 저장 완료 — ' + data.date);
  }

  // 초기화
  function clearLog() {
    if (!confirm('오늘 기록을 모두 초기화할까요?')) return;
    document.getElementById('f-date').valueAsDate = new Date();
    ['f-duration','f-good','f-improve','f-memo'].forEach(id => {
      document.getElementById(id).value = '';
    });
    rating = 0;
    document.querySelectorAll('#stars .star').forEach(s => s.classList.remove('on'));
    document.getElementById('rating-label').textContent = '별을 클릭해 만족도를 남겨보세요';
    document.querySelectorAll('.check-item').forEach(item => {
      item.querySelector('input[type=checkbox]').checked = false;
      item.querySelector('input[type=text]').value = '';
      item.classList.remove('done');
    });
    updateProgress();
    showToast('초기화되었습니다');
  }

  // Toast
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  updateProgress();
</script>
</body>
</html>
