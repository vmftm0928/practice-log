<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>드럼 연습 일지</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap');

  :root {
    --bg: #0e0e10;
    --surface: #18181c;
    --surface2: #222228;
    --border: #2e2e36;
    --accent: #e05c2a;
    --accent-dim: rgba(224,92,42,0.15);
    --text: #f0ede8;
    --text-2: #9896a0;
    --text-3: #55545e;
    --green: #3ecf6e;
    --green-dim: rgba(62,207,110,0.12);
    --radius: 10px;
    --radius-lg: 16px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .page {
    max-width: 720px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 2.5rem;
  }
  .drum-icon {
    width: 48px; height: 48px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .header-text h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .header-text p {
    font-size: 13px;
    color: var(--text-2);
    margin-top: 2px;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.4rem 1.5rem;
    margin-bottom: 1rem;
  }
  .card-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .card-title span {
    display: inline-block;
    width: 3px; height: 12px;
    background: var(--accent);
    border-radius: 2px;
  }

  /* Form fields */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label {
    font-size: 11px;
    color: var(--text-2);
    font-weight: 500;
    letter-spacing: 0.03em;
  }
  .field input, .field textarea, .field select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 12px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    border-color: var(--accent);
  }
  .field input::placeholder, .field textarea::placeholder {
    color: var(--text-3);
  }
  .field textarea {
    resize: vertical;
    min-height: 80px;
    line-height: 1.7;
  }

  /* 참고표 */
  .ref-table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    text-align: left;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-3);
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }
  tbody td { padding: 4px 6px; }
  tbody td input {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    padding: 5px 4px;
    outline: none;
    border-radius: 6px;
    transition: background 0.12s;
  }
  tbody td input:focus { background: var(--surface2); }
  tbody td input::placeholder { color: var(--text-3); }
  .del-row {
    background: none;
    border: none;
    color: var(--text-3);
    cursor: pointer;
    font-size: 16px;
    padding: 4px 6px;
    border-radius: 6px;
    transition: color 0.12s, background 0.12s;
  }
  .del-row:hover { color: var(--accent); background: var(--accent-dim); }

  /* Add buttons */
  .add-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-2);
    background: none;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 7px 14px;
    margin-top: 10px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: border-color 0.15s, color 0.15s;
    width: 100%;
    justify-content: center;
  }
  .add-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* 체크리스트 */
  .check-list { display: flex; flex-direction: column; gap: 8px; }
  .check-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px;
    transition: border-color 0.15s;
  }
  .check-item.done {
    border-color: var(--green);
    background: var(--green-dim);
  }
  .check-item input[type=checkbox] {
    width: 16px; height: 16px;
    accent-color: var(--green);
    flex-shrink: 0;
    cursor: pointer;
  }
  .check-item input[type=text] {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    outline: none;
    padding: 0;
  }
  .check-item input[type=text]::placeholder { color: var(--text-3); }
  .check-item.done input[type=text] {
    text-decoration: line-through;
    color: var(--text-2);
  }

  /* 별점 */
  .stars { display: flex; gap: 6px; margin-top: 6px; }
  .star {
    font-size: 26px;
    color: var(--text-3);
    cursor: pointer;
    transition: color 0.1s, transform 0.1s;
    line-height: 1;
    user-select: none;
  }
  .star:hover { transform: scale(1.15); }
  .star.on { color: #f0a500; }
  .rating-label {
    font-size: 12px;
    color: var(--text-2);
    margin-top: 6px;
    min-height: 18px;
    transition: color 0.2s;
  }

  /* Divider */
  hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }

  /* Bottom bar */
  .bottom-bar {
    display: flex;
    gap: 10px;
    margin-top: 1.5rem;
  }

    flex: 1;
    padding: 12px;
    font
